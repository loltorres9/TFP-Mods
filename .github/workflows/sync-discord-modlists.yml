name: Sync Modlists from Discord

on:
  schedule:
    - cron: "*/30 * * * *"  # runs every 30 minutes
  workflow_dispatch:         # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch modlists from Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/sync_discord.py

      - name: Commit and push if files changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mission_mods.html "taskforce_phalanx_mods core.html" taskforce_phalanx_mods_JointOp.html taskforce_phalanx_mods_optional.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync modlists from Discord"
            git push
          fi
